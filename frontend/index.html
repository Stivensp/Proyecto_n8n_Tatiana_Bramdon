<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistente de vestimenta por clima</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Asistente de vestimenta por clima</h1>
    <p class="subtitle">Consulta rápida con respuesta JSON completa</p>

    <div class="form">
      <input 
        type="text"
        id="cityInput"
        placeholder="Escribe una ciudad"
      >
      <button onclick="consultWeather()">Consultar</button>
    </div>

    <div id="result" class="result hidden">
      <div class="grid">
        <div class="item">
          <span class="label">Ciudad</span>
          <span id="city" class="value"></span>
        </div>
        <div class="item">
          <span class="label">Temperatura</span>
          <span id="temperature" class="value"></span>
        </div>
        <div class="item">
          <span class="label">Condición</span>
          <span id="condition" class="value"></span>
        </div>
      </div>
      <div class="item full">
        <span class="label">Recomendación</span>
        <p id="recommendation" class="recommendation"></p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
